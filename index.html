<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crop Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 pb-12 font-sans">

  <!-- Header -->
  <header class="bg-emerald-700 text-white py-5 shadow-lg">
    <div class="max-w-xl mx-auto px-4 flex justify-between items-center">
      <div>
        <h1 class="text-xl font-bold tracking-wide">🌾 Crop Expense Tracker</h1>
        <p class="text-emerald-200 text-xs mt-0.5">Tracking Home, Ashok & Dhanu</p>
      </div>
      <button onclick="exportCSV()" class="bg-emerald-800 hover:bg-emerald-900 text-xs px-3 py-1.5 rounded-lg border border-emerald-600 font-medium transition">
        📥 Export CSV
      </button>
    </div>
  </header>

  <main class="max-w-xl mx-auto px-4 mt-5 space-y-5">

    <!-- Expense Entry Form -->
    <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
      <h2 class="text-base font-bold text-slate-700 mb-3 border-b pb-2">Add New Expense</h2>
      
      <form id="expenseForm" class="space-y-4">
        <!-- Spent By -->
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Spent By</label>
          <div class="grid grid-cols-3 gap-2">
            <label class="cursor-pointer">
              <input type="radio" name="spentBy" value="Home" class="peer hidden" required>
              <div class="text-center py-2 px-3 text-xs font-semibold rounded-lg border border-slate-300 text-slate-600 peer-checked:bg-emerald-600 peer-checked:text-white peer-checked:border-emerald-600 transition">
                Home
              </div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" name="spentBy" value="Ashok" class="peer hidden" required>
              <div class="text-center py-2 px-3 text-xs font-semibold rounded-lg border border-slate-300 text-slate-600 peer-checked:bg-emerald-600 peer-checked:text-white peer-checked:border-emerald-600 transition">
                Ashok
              </div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" name="spentBy" value="Dhanu" class="peer hidden" required>
              <div class="text-center py-2 px-3 text-xs font-semibold rounded-lg border border-slate-300 text-slate-600 peer-checked:bg-emerald-600 peer-checked:text-white peer-checked:border-emerald-600 transition">
                Dhanu
              </div>
            </label>
          </div>
        </div>

        <!-- Crop & Category -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Crop Name</label>
            <input type="text" id="cropName" placeholder="e.g. Paddy, Tomato" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" required>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Expense Type</label>
            <select id="category" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" required>
              <option value="Seeds">Seeds</option>
              <option value="Fertilizers/Pesticides">Fertilizer / Pesticide</option>
              <option value="Labor">Labor</option>
              <option value="Tractor/Machinery">Tractor / Machinery</option>
              <option value="Irrigation">Irrigation</option>
              <option value="Transport/Other">Transport / Other</option>
            </select>
          </div>
        </div>

        <!-- Amount & Date -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Amount (₹)</label>
            <input type="number" id="amount" min="1" placeholder="0" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" required>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Date</label>
            <input type="date" id="expenseDate" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" required>
          </div>
        </div>

        <!-- Notes -->
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Note / Details (Optional)</label>
          <input type="text" id="notes" placeholder="e.g., 2 bags of Urea" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
        </div>

        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 rounded-lg text-sm shadow-sm transition">
          + Add Expense
        </button>
      </form>
    </section>

    <!-- Summary Cards -->
    <section class="grid grid-cols-3 gap-3">
      <div class="bg-white p-3.5 rounded-xl border border-slate-200 text-center shadow-sm">
        <p class="text-[10px] uppercase tracking-wider font-bold text-slate-400">Home</p>
        <p id="totalHome" class="text-base font-bold text-emerald-700 mt-0.5">₹0</p>
      </div>
      <div class="bg-white p-3.5 rounded-xl border border-slate-200 text-center shadow-sm">
        <p class="text-[10px] uppercase tracking-wider font-bold text-slate-400">Ashok</p>
        <p id="totalAshok" class="text-base font-bold text-emerald-700 mt-0.5">₹0</p>
      </div>
      <div class="bg-white p-3.5 rounded-xl border border-slate-200 text-center shadow-sm">
        <p class="text-[10px] uppercase tracking-wider font-bold text-slate-400">Dhanu</p>
        <p id="totalDhanu" class="text-base font-bold text-emerald-700 mt-0.5">₹0</p>
      </div>
    </section>

    <!-- History & Filter Section -->
    <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
      <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-2 mb-4 pb-2 border-b">
        <h2 class="text-base font-bold text-slate-700">Recent Records</h2>
        <div class="flex items-center gap-2">
          <!-- Filter Dropdown -->
          <select id="filterPerson" onchange="renderList()" class="border border-slate-300 text-xs rounded-lg p-1.5 focus:outline-none">
            <option value="ALL">All Persons</option>
            <option value="Home">Home</option>
            <option value="Ashok">Ashok</option>
            <option value="Dhanu">Dhanu</option>
          </select>
          <span id="grandTotal" class="text-xs font-bold text-slate-700 bg-slate-100 px-2 py-1 rounded-md">Total: ₹0</span>
        </div>
      </div>

      <div id="expenseList" class="space-y-3">
        <!-- Expenses load dynamically -->
      </div>
    </section>

  </main>

  <script>
    let expenses = JSON.parse(localStorage.getItem('crop_expenses_data')) || [];

    // Initialize default date
    document.getElementById('expenseDate').valueAsDate = new Date();

    const form = document.getElementById('expenseForm');

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const selectedPerson = document.querySelector('input[name="spentBy"]:checked');
      if (!selectedPerson) return;

      const record = {
        id: Date.now(),
        spentBy: selectedPerson.value,
        cropName: document.getElementById('cropName').value.trim(),
        category: document.getElementById('category').value,
        amount: parseFloat(document.getElementById('amount').value),
        date: document.getElementById('expenseDate').value,
        notes: document.getElementById('notes').value.trim()
      };

      expenses.unshift(record);
      saveAndRender();

      // Reset form fields
      form.reset();
      document.getElementById('expenseDate').valueAsDate = new Date();
    });

    function deleteRecord(id) {
      if (confirm('Delete this record?')) {
        expenses = expenses.filter(item => item.id !== id);
        saveAndRender();
      }
    }

    function saveAndRender() {
      localStorage.setItem('crop_expenses_data', JSON.stringify(expenses));
      renderSummary();
      renderList();
    }

    function renderSummary() {
      let home = 0, ashok = 0, dhanu = 0, grand = 0;

      expenses.forEach(e => {
        grand += e.amount;
        if (e.spentBy === 'Home') home += e.amount;
        if (e.spentBy === 'Ashok') ashok += e.amount;
        if (e.spentBy === 'Dhanu') dhanu += e.amount;
      });

      document.getElementById('totalHome').textContent = `₹${home.toLocaleString('en-IN')}`;
      document.getElementById('totalAshok').textContent = `₹${ashok.toLocaleString('en-IN')}`;
      document.getElementById('totalDhanu').textContent = `₹${dhanu.toLocaleString('en-IN')}`;
      document.getElementById('grandTotal').textContent = `Total: ₹${grand.toLocaleString('en-IN')}`;
    }

    function renderList() {
      const container = document.getElementById('expenseList');
      const filter = document.getElementById('filterPerson').value;

      const filteredData = filter === 'ALL' 
        ? expenses 
        : expenses.filter(e => e.spentBy === filter);

      if (filteredData.length === 0) {
        container.innerHTML = `<p class="text-center text-slate-400 py-6 text-xs">No records found.</p>`;
        return;
      }

      container.innerHTML = filteredData.map(item => `
        <div class="flex items-center justify-between p-3 rounded-lg bg-slate-50 border border-slate-100">
          <div class="space-y-0.5">
            <div class="flex items-center gap-2">
              <span class="font-bold text-sm text-slate-800">${escapeHtml(item.cropName)}</span>
              <span class="text-[10px] font-bold px-2 py-0.5 rounded-full ${
                item.spentBy === 'Home' ? 'bg-blue-100 text-blue-700' :
                item.spentBy === 'Ashok' ? 'bg-amber-100 text-amber-800' :
                'bg-purple-100 text-purple-700'
              }">${item.spentBy}</span>
            </div>
            <p class="text-xs text-slate-500">${item.category} • ${item.date}</p>
            ${item.notes ? `<p class="text-xs text-slate-600 italic">Note: ${escapeHtml(item.notes)}</p>` : ''}
          </div>
          <div class="flex items-center gap-3">
            <span class="font-extrabold text-sm text-slate-700">₹${item.amount.toLocaleString('en-IN')}</span>
            <button onclick="deleteRecord(${item.id})" class="text-slate-400 hover:text-red-500 text-xs font-bold transition">✕</button>
          </div>
        </div>
      `).join('');
    }

    function exportCSV() {
      if (expenses.length === 0) return alert('No data to export!');
      
      let csv = 'Date,Spent By,Crop Name,Category,Amount,Notes\n';
      expenses.forEach(e => {
        csv += `"${e.date}","${e.spentBy}","${e.cropName}","${e.category}",${e.amount},"${e.notes}"\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.setAttribute('href', url);
      a.setAttribute('download', 'crop_expenses.csv');
      a.click();
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[m]);
    }

    // Initial Load
    saveAndRender();
  </script>
</body>
</html>
