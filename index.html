<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crop Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 pb-12 font-sans">

  <!-- Header -->
  <header class="bg-emerald-700 text-white py-5 shadow-lg">
    <div class="max-w-xl mx-auto px-4 flex justify-between items-center">
      <div>
        <h1 class="text-xl font-bold tracking-wide">🌾 Crop Expense Tracker</h1>
        <p class="text-emerald-200 text-xs mt-0.5">Manage & track farm expenses easily</p>
      </div>
      <div class="flex gap-2">
        <button onclick="exportCSV()" class="bg-emerald-800 hover:bg-emerald-900 text-xs text-white px-2.5 py-1.5 rounded-lg border border-emerald-600 font-medium transition flex items-center gap-1">
          📥 Export CSV
        </button>
        <button onclick="shareToWhatsApp()" class="bg-green-600 hover:bg-green-700 text-xs text-white px-2.5 py-1.5 rounded-lg font-bold shadow-sm transition flex items-center gap-1">
          💬 WhatsApp
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-xl mx-auto px-4 mt-5 space-y-5">

    <!-- Add Expense Form -->
    <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
      <h2 class="text-base font-bold text-slate-700 mb-3 border-b pb-2">Add New Expense</h2>
      
      <form id="expenseForm" class="space-y-4">
        <!-- Spent By -->
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Spent By</label>
          <select id="spentBySelect" onchange="toggleCustomInputs()" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" required>
            <option value="Home">Home</option>
            <option value="Ashok">Ashok</option>
            <option value="Dhanu">Dhanu</option>
            <option value="CUSTOM">+ Enter Custom Name</option>
          </select>
          <input type="text" id="customPersonInput" placeholder="Enter person name" class="hidden w-full mt-2 border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
        </div>

        <!-- Crop Name Select & Expense Type -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Crop Name</label>
            <select id="cropSelect" onchange="toggleCustomInputs()" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" required>
              <!-- Populated with Tomato and Groundnut -->
            </select>
            <input type="text" id="customCropInput" placeholder="Enter new crop name" class="hidden w-full mt-2 border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
          </div>

          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Expense Type</label>
            <select id="categorySelect" onchange="toggleCustomInputs()" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" required>
              <option value="Seeds">Seeds</option>
              <option value="Fertilizer/Pesticide">Fertilizer / Pesticide</option>
              <option value="Labor">Labor</option>
              <option value="Machinery/Tractor">Machinery / Tractor</option>
              <option value="Irrigation">Irrigation</option>
              <option value="Transport">Transport</option>
              <option value="CUSTOM">+ Enter Custom Type</option>
            </select>
            <input type="text" id="customCategoryInput" placeholder="Enter expense type" class="hidden w-full mt-2 border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
          </div>
        </div>

        <!-- Amount & Date -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Amount (₹)</label>
            <input type="number" id="amount" min="1" placeholder="0" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" required>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Date</label>
            <input type="date" id="expenseDate" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" required>
          </div>
        </div>

        <!-- Notes -->
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Note / Details (Optional)</label>
          <input type="text" id="notes" placeholder="e.g., Bought from shop" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
        </div>

        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 rounded-lg text-sm shadow-sm transition">
          + Add Expense
        </button>
      </form>
    </section>

    <!-- Spending Breakdown Summary -->
    <section class="grid grid-cols-3 gap-3" id="summaryCards">
      <!-- Dynamic summary totals generate here -->
    </section>

    <!-- History & Filter Section -->
    <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
      <div class="flex flex-col space-y-3 mb-4 pb-3 border-b">
        <div class="flex justify-between items-center">
          <h2 class="text-base font-bold text-slate-700">Expense History</h2>
          <span id="grandTotal" class="text-xs font-bold text-emerald-800 bg-emerald-50 border border-emerald-200 px-2.5 py-1 rounded-md">Filtered Total: ₹0</span>
        </div>

        <!-- Dynamic Filters -->
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Filter by Person</label>
            <select id="filterPerson" onchange="onPersonFilterChange()" class="w-full border border-slate-300 text-xs rounded-lg p-2 focus:outline-none">
              <option value="ALL">All Persons</option>
            </select>
          </div>
          <div>
            <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Filter by Crop</label>
            <select id="filterCrop" onchange="renderList()" class="w-full border border-slate-300 text-xs rounded-lg p-2 focus:outline-none">
              <option value="ALL">All Crops</option>
            </select>
          </div>
        </div>
      </div>

      <div id="expenseList" class="space-y-3">
        <!-- Records load dynamically -->
      </div>
    </section>

  </main>

  <script>
    let expenses = JSON.parse(localStorage.getItem('crop_expenses_v2')) || [];

    // Updated default crops: Tomato and Groundnut
    const defaultCrops = ['Tomato', 'Groundnut'];

    // Set default date
    document.getElementById('expenseDate').valueAsDate = new Date();

    function toggleCustomInputs() {
      // Custom Person Input
      const spentBySelect = document.getElementById('spentBySelect');
      const customPersonInput = document.getElementById('customPersonInput');
      if (spentBySelect.value === 'CUSTOM') {
        customPersonInput.classList.remove('hidden');
        customPersonInput.required = true;
      } else {
        customPersonInput.classList.add('hidden');
        customPersonInput.required = false;
      }

      // Custom Crop Input
      const cropSelect = document.getElementById('cropSelect');
      const customCropInput = document.getElementById('customCropInput');
      if (cropSelect.value === 'CUSTOM') {
        customCropInput.classList.remove('hidden');
        customCropInput.required = true;
      } else {
        customCropInput.classList.add('hidden');
        customCropInput.required = false;
      }

      // Custom Expense Category Input
      const categorySelect = document.getElementById('categorySelect');
      const customCategoryInput = document.getElementById('customCategoryInput');
      if (categorySelect.value === 'CUSTOM') {
        customCategoryInput.classList.remove('hidden');
        customCategoryInput.required = true;
      } else {
        customCategoryInput.classList.add('hidden');
        customCategoryInput.required = false;
      }
    }

    // Populate Crop Form Selection Dropdown
    function populateFormCropDropdown() {
      const cropSelect = document.getElementById('cropSelect');
      const currentSelected = cropSelect.value;

      const recordedCrops = expenses.map(e => e.cropName);
      const uniqueCrops = [...new Set([...defaultCrops, ...recordedCrops])];

      cropSelect.innerHTML = uniqueCrops.map(c => `<option value="${c}">${c}</option>`).join('') + 
        '<option value="CUSTOM">+ Enter New Crop</option>';

      if (uniqueCrops.includes(currentSelected)) {
        cropSelect.value = currentSelected;
      }
    }

    // Form submission
    document.getElementById('expenseForm').addEventListener('submit', (e) => {
      e.preventDefault();

      const spentBySelect = document.getElementById('spentBySelect').value;
      const finalSpentBy = spentBySelect === 'CUSTOM' 
        ? document.getElementById('customPersonInput').value.trim() 
        : spentBySelect;

      const cropSelect = document.getElementById('cropSelect').value;
      const finalCrop = cropSelect === 'CUSTOM' 
        ? document.getElementById('customCropInput').value.trim() 
        : cropSelect;

      const categorySelect = document.getElementById('categorySelect').value;
      const finalCategory = categorySelect === 'CUSTOM' 
        ? document.getElementById('customCategoryInput').value.trim() 
        : categorySelect;

      const record = {
        id: Date.now(),
        spentBy: finalSpentBy,
        cropName: finalCrop,
        category: finalCategory,
        amount: parseFloat(document.getElementById('amount').value),
        date: document.getElementById('expenseDate').value,
        notes: document.getElementById('notes').value.trim()
      };

      expenses.unshift(record);
      saveAndRender();

      // Reset Form
      e.target.reset();
      document.getElementById('expenseDate').valueAsDate = new Date();
      toggleCustomInputs();
    });

    function deleteRecord(id) {
      if (confirm('Delete this expense entry?')) {
        expenses = expenses.filter(item => item.id !== id);
        saveAndRender();
      }
    }

    function saveAndRender() {
      localStorage.setItem('crop_expenses_v2', JSON.stringify(expenses));
      populateFormCropDropdown();
      populatePersonDropdown();
      populateCropDropdown();
      renderSummary();
      renderList();
    }

    // Populate Person Filter Dropdown
    function populatePersonDropdown() {
      const personFilter = document.getElementById('filterPerson');
      const currentPersonVal = personFilter.value;

      const defaultPersons = ['Home', 'Ashok', 'Dhanu'];
      const recordedPersons = expenses.map(e => e.spentBy);
      const uniquePersons = [...new Set([...defaultPersons, ...recordedPersons])];

      personFilter.innerHTML = '<option value="ALL">All Persons</option>' + 
        uniquePersons.map(p => `<option value="${p}">${p}</option>`).join('');

      personFilter.value = uniquePersons.includes(currentPersonVal) ? currentPersonVal : 'ALL';
    }

    // Populate Crop Dropdown based on Selected Person
    function populateCropDropdown() {
      const personFilter = document.getElementById('filterPerson').value;
      const cropFilter = document.getElementById('filterCrop');
      const currentCropVal = cropFilter.value;

      let relevantExpenses = expenses;
      if (personFilter !== 'ALL') {
        relevantExpenses = expenses.filter(e => e.spentBy.toLowerCase() === personFilter.toLowerCase());
      }

      const uniqueCrops = [...new Set(relevantExpenses.map(e => e.cropName))];

      cropFilter.innerHTML = '<option value="ALL">All Crops</option>' + 
        uniqueCrops.map(c => `<option value="${c}">${c}</option>`).join('');

      if (uniqueCrops.some(c => c.toLowerCase() === currentCropVal.toLowerCase())) {
        cropFilter.value = currentCropVal;
      } else {
        cropFilter.value = 'ALL';
      }
    }

    function onPersonFilterChange() {
      populateCropDropdown();
      renderList();
    }

    function renderSummary() {
      const summaryCards = document.getElementById('summaryCards');
      
      const personTotals = {};
      expenses.forEach(e => {
        personTotals[e.spentBy] = (personTotals[e.spentBy] || 0) + e.amount;
      });

      ['Home', 'Ashok', 'Dhanu'].forEach(p => {
        if (!(p in personTotals)) personTotals[p] = 0;
      });

      summaryCards.innerHTML = Object.keys(personTotals).map(person => `
        <div class="bg-white p-3 rounded-xl border border-slate-200 text-center shadow-sm">
          <p class="text-[10px] uppercase tracking-wider font-bold text-slate-400 truncate">${person}</p>
          <p class="text-sm sm:text-base font-bold text-emerald-700 mt-0.5">₹${personTotals[person].toLocaleString('en-IN')}</p>
        </div>
      `).join('');
    }

    function renderList() {
      const container = document.getElementById('expenseList');
      const personFilter = document.getElementById('filterPerson').value;
      const cropFilter = document.getElementById('filterCrop').value;

      const filtered = expenses.filter(e => {
        const matchesPerson = personFilter === 'ALL' || e.spentBy.toLowerCase() === personFilter.toLowerCase();
        const matchesCrop = cropFilter === 'ALL' || e.cropName.toLowerCase() === cropFilter.toLowerCase();
        return matchesPerson && matchesCrop;
      });

      const totalFiltered = filtered.reduce((sum, item) => sum + item.amount, 0);
      document.getElementById('grandTotal').textContent = `Filtered Total: ₹${totalFiltered.toLocaleString('en-IN')}`;

      if (filtered.length === 0) {
        container.innerHTML = `<p class="text-center text-slate-400 py-6 text-xs">No records matching selected filters.</p>`;
        return;
      }

      container.innerHTML = filtered.map(item => `
        <div class="flex items-center justify-between p-3 rounded-lg bg-slate-50 border border-slate-100">
          <div class="space-y-0.5">
            <div class="flex items-center gap-2">
              <span class="font-bold text-sm text-slate-800">${escapeHtml(item.cropName)}</span>
              <span class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-800">${escapeHtml(item.spentBy)}</span>
            </div>
            <p class="text-xs text-slate-500">${escapeHtml(item.category)} • ${item.date}</p>
            ${item.notes ? `<p class="text-xs text-slate-600 italic">Note: ${escapeHtml(item.notes)}</p>` : ''}
          </div>
          <div class="flex items-center gap-3">
            <span class="font-extrabold text-sm text-slate-700">₹${item.amount.toLocaleString('en-IN')}</span>
            <button onclick="deleteRecord(${item.id})" class="text-slate-400 hover:text-red-500 text-xs font-bold transition">✕</button>
          </div>
        </div>
      `).join('');
    }

    // Export Standalone CSV
    function exportCSV() {
      if (expenses.length === 0) return alert('No expenses to export!');
      
      let csv = 'Date,Spent By,Crop Name,Category,Amount,Notes\n';
      expenses.forEach(e => {
        csv += `"${e.date}","${e.spentBy}","${e.cropName}","${e.category}",${e.amount},"${e.notes}"\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.setAttribute('href', url);
      a.setAttribute('download', `crop_expenses_${new Date().toISOString().slice(0,10)}.csv`);
      a.click();
    }

    // WhatsApp Share Feature
    function shareToWhatsApp() {
      if (expenses.length === 0) {
        return alert('No expenses to share!');
      }

      // Download CSV File automatically
      exportCSV();

      // Build text summary message
      const personTotals = {};
      let totalAmount = 0;

      expenses.forEach(e => {
        personTotals[e.spentBy] = (personTotals[e.spentBy] || 0) + e.amount;
        totalAmount += e.amount;
      });

      let textMsg = `🌾 *Crop Expense Summary*\n`;
      textMsg += `📅 *Date:* ${new Date().toLocaleDateString('en-IN')}\n\n`;
      textMsg += `*Breakdown by Person:*\n`;

      Object.keys(personTotals).forEach(p => {
        textMsg += `• ${p}: ₹${personTotals[p].toLocaleString('en-IN')}\n`;
      });

      textMsg += `----------------------------\n`;
      textMsg += `💰 *Grand Total:* ₹${totalAmount.toLocaleString('en-IN')}\n\n`;
      textMsg += `_(CSV report downloaded to device)_`;

      // Open WhatsApp directly to target number +91 7075226826
      const phoneNumber = "917075226826";
      const whatsappUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodeURIComponent(textMsg)}`;
      
      window.open(whatsappUrl, '_blank');
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[m]);
    }

    // Initial load
    saveAndRender();
  </script>
</body>
</html>
